name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  verify:
    # Test on the actual shipping platforms (desktop macOS + Windows), not Linux —
    # the app never runs on Linux, and the Linux ffmpeg-static build is unreliable.
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      - name: End-to-end smoke (ingest → library → search → assembly → blur gate)
        if: runner.os == 'macOS'
        run: npm run smoke
