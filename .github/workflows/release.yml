name: release

# Push a tag like v0.1.0 to build and publish installers for both platforms.
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  installers:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest # Apple Silicon → .dmg + .zip
          - os: windows-latest # → NSIS .exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - name: Build renderer/main/preload bundles
        run: npm run build
      - name: Build & publish installer
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Unsigned builds for now (demo). Add signing certs later via secrets.
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: npx electron-builder --publish always
